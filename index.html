<!doctype html>

    <title>Wabi 2.0</title>

    <style>
      @font-face {
        font-family: 'Selecta';
        src: url('/fonts/Selecta-Regular.otf') format('opentype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Selecta';
        src: url('/fonts/Selecta-Medium.otf') format('opentype');
        font-weight: 500;
        font-style: normal;
        font-display: swap;

      @font-face {

        font-display: swap;

        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        background: #f0f0f0;

      /* Let html be the natural scroll container — body with `overflow-y: auto`

      body {
        overflow-x: hidden;

      #root {
        width: 100%;
      }
